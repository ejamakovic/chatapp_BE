spring.application.name=${SPRING_APPLICATION_NAME:chatapp}

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:com.microsoft.sqlserver.jdbc.SQLServerDriver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ?? EMOJI & UNICODE ??
spring.jpa.properties.hibernate.connection.useUnicode=true
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.charSet=UTF-8

# Logging
logging.level.org.springframework.jdbc.core=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=ERROR
logging.level.org.springframework.boot=WARN

# General
spring.main.banner-mode=off
server.port=${SERVER_PORT:8080}

# Multipart
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:50MB}

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-ms=${JWT_ACCESS_TOKEN_EXPIRY_MS:900000}
jwt.refresh-token-expiry-ms=${JWT_REFRESH_TOKEN_EXPIRY_MS:604800000}

# Batch Fetching
spring.jpa.properties.hibernate.default_batch_fetch_size=50